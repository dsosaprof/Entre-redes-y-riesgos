<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 842 595" role="img" aria-labelledby="title desc">
  <title id="title">Fichas rapidas por riesgo digital</title>
  <desc id="desc">Fichas breves con definicion, senal y accion para seis riesgos digitales.</desc>
  <rect width="842" height="595" fill="#f5f3ee"/>
  <text x="42" y="48" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#1a1814">Fichas rápidas por riesgo</text>
  <text x="42" y="75" font-family="Verdana" font-size="14" fill="#3d3a35">Lee en 30 segundos: qué es, señal y primera acción.</text>
  <g font-family="Verdana" font-size="13" fill="#1a1814">
    <g transform="translate(42 105)"><rect width="240" height="130" rx="14" fill="#fff" stroke="#c0392b" stroke-width="4"/><text x="18" y="30" font-size="17" font-weight="700" fill="#c0392b">Ciberacoso</text><text x="18" y="59">Daño repetido por medios digitales.</text><text x="18" y="84" font-weight="700">Señal:</text><text x="72" y="84">burlas, amenazas o difusión.</text><text x="18" y="110" font-weight="700">Acción:</text><text x="76" y="110">captura y reporta.</text></g>
    <g transform="translate(302 105)"><rect width="240" height="130" rx="14" fill="#fff" stroke="#2c6e8a" stroke-width="4"/><text x="18" y="30" font-size="17" font-weight="700" fill="#2c6e8a">Contraseñas</text><text x="18" y="59">Protegen la entrada a tus cuentas.</text><text x="18" y="84" font-weight="700">Señal:</text><text x="72" y="84">repetir o usar claves obvias.</text><text x="18" y="110" font-weight="700">Acción:</text><text x="76" y="110">clave larga + 2FA.</text></g>
    <g transform="translate(562 105)"><rect width="240" height="130" rx="14" fill="#fff" stroke="#e67e22" stroke-width="4"/><text x="18" y="30" font-size="17" font-weight="700" fill="#b85d12">Phishing</text><text x="18" y="59">Engaño para robar datos o códigos.</text><text x="18" y="84" font-weight="700">Señal:</text><text x="72" y="84">urgencia, premio o enlace raro.</text><text x="18" y="110" font-weight="700">Acción:</text><text x="76" y="110">verifica por canal oficial.</text></g>
    <g transform="translate(42 275)"><rect width="240" height="130" rx="14" fill="#fff" stroke="#3f7d58" stroke-width="4"/><text x="18" y="30" font-size="17" font-weight="700" fill="#3f7d58">Privacidad</text><text x="18" y="59">Control de datos, permisos y rastreo.</text><text x="18" y="84" font-weight="700">Señal:</text><text x="72" y="84">apps piden de más.</text><text x="18" y="110" font-weight="700">Acción:</text><text x="76" y="110">revisa ajustes.</text></g>
    <g transform="translate(302 275)"><rect width="240" height="130" rx="14" fill="#fff" stroke="#7f4aa0" stroke-width="4"/><text x="18" y="30" font-size="17" font-weight="700" fill="#7f4aa0">Grooming</text><text x="18" y="59">Manipulación de un adulto en línea.</text><text x="18" y="84" font-weight="700">Señal:</text><text x="72" y="84">secreto, fotos o presión.</text><text x="18" y="110" font-weight="700">Acción:</text><text x="76" y="110">busca ayuda adulta.</text></g>
    <g transform="translate(562 275)"><rect width="240" height="130" rx="14" fill="#fff" stroke="#1f6f8b" stroke-width="4"/><text x="18" y="30" font-size="17" font-weight="700" fill="#1f6f8b">Identidad digital</text><text x="18" y="59">Huella de lo que haces y publicas.</text><text x="18" y="84" font-weight="700">Señal:</text><text x="72" y="84">datos personales visibles.</text><text x="18" y="110" font-weight="700">Acción:</text><text x="76" y="110">limita y actualiza perfiles.</text></g>
  </g>
  <text x="42" y="515" font-family="Verdana" font-size="13" fill="#6b6560">DUA: fichas breves para leer, proyectar, recortar o usar como apoyo oral.</text>
</svg>
