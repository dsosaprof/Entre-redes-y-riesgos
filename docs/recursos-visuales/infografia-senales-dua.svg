<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 842 595" role="img" aria-labelledby="title desc">
  <title id="title">Infografia imprimible: senales de alerta digital</title>
  <desc id="desc">Infografia basada en DUA con senales visuales, texto breve y acciones concretas ante riesgos digitales.</desc>
  <rect width="842" height="595" fill="#fff8ed"/>
  <rect x="32" y="30" width="778" height="535" rx="20" fill="#ffffff" stroke="#1a1814" stroke-width="4"/>
  <text x="62" y="82" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#1a1814">Señales de alerta digital</text>
  <text x="62" y="116" font-family="Verdana, sans-serif" font-size="16" fill="#3d3a35">Mira, piensa, decide y pide apoyo. Recurso DUA: visual, lectura breve y acción concreta.</text>
  <g transform="translate(62 154)">
    <g>
      <rect width="214" height="145" rx="16" fill="#fdf3e7" stroke="#c0392b" stroke-width="4"/>
      <circle cx="36" cy="38" r="20" fill="#c0392b"/><text x="30" y="46" font-family="Verdana" font-size="24" font-weight="700" fill="#fff">!</text>
      <text x="68" y="39" font-family="Verdana" font-size="18" font-weight="700" fill="#1a1814">Urgencia</text>
      <text x="24" y="78" font-family="Verdana" font-size="14" fill="#3d3a35">“Hoy se cierra tu cuenta”</text>
      <text x="24" y="103" font-family="Verdana" font-size="14" fill="#3d3a35">No abras enlaces rápidos.</text>
      <text x="24" y="128" font-family="Verdana" font-size="14" font-weight="700" fill="#c0392b">Entra desde el sitio oficial.</text>
    </g>
    <g transform="translate(254 0)">
      <rect width="214" height="145" rx="16" fill="#eef6f8" stroke="#2c6e8a" stroke-width="4"/>
      <circle cx="36" cy="38" r="20" fill="#2c6e8a"/><text x="29" y="46" font-family="Verdana" font-size="22" font-weight="700" fill="#fff">?</text>
      <text x="68" y="39" font-family="Verdana" font-size="18" font-weight="700" fill="#1a1814">Secreto</text>
      <text x="24" y="78" font-family="Verdana" font-size="14" fill="#3d3a35">“No le digas a nadie”</text>
      <text x="24" y="103" font-family="Verdana" font-size="14" fill="#3d3a35">La presión no es confianza.</text>
      <text x="24" y="128" font-family="Verdana" font-size="14" font-weight="700" fill="#2c6e8a">Busca a un adulto seguro.</text>
    </g>
    <g transform="translate(508 0)">
      <rect width="214" height="145" rx="16" fill="#fff2de" stroke="#e67e22" stroke-width="4"/>
      <circle cx="36" cy="38" r="20" fill="#e67e22"/><text x="29" y="45" font-family="Verdana" font-size="20" font-weight="700" fill="#fff">↗</text>
      <text x="68" y="39" font-family="Verdana" font-size="18" font-weight="700" fill="#1a1814">Enlace raro</text>
      <text x="24" y="78" font-family="Verdana" font-size="14" fill="#3d3a35">Premios, códigos o regalos</text>
      <text x="24" y="103" font-family="Verdana" font-size="14" fill="#3d3a35">pueden ocultar phishing.</text>
      <text x="24" y="128" font-family="Verdana" font-size="14" font-weight="700" fill="#b85d12">Verifica antes de tocar.</text>
    </g>
  </g>
  <g transform="translate(62 350)">
    <rect width="720" height="150" rx="18" fill="#1a1814"/>
    <text x="28" y="45" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#fff">Ruta corta de acción</text>
    <g font-family="Verdana" font-size="15" fill="#f5f3ee">
      <text x="30" y="88">1. Detente: no respondas en caliente.</text>
      <text x="30" y="118">2. Guarda evidencia: capturas, fecha y usuario.</text>
      <text x="365" y="88">3. Reporta o bloquea desde la plataforma.</text>
      <text x="365" y="118">4. Pide apoyo si hay presión, amenaza o daño.</text>
    </g>
  </g>
  <text x="62" y="535" font-family="Verdana" font-size="13" fill="#6b6560">DUA: combina iconos, colores, frases breves y pasos concretos para apoyar distintas formas de aprender.</text>
</svg>
