<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 842 595" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de decision ante riesgo digital</title>
  <desc id="desc">Mapa imprimible con decisiones paso a paso para actuar ante un riesgo digital.</desc>
  <rect width="842" height="595" fill="#eef6f8"/>
  <text x="54" y="64" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#1a1814">Mapa de decisión</text>
  <text x="54" y="94" font-family="Verdana" font-size="15" fill="#3d3a35">Úsalo cuando algo en línea te parezca raro, agresivo o peligroso.</text>
  <g font-family="Verdana" font-size="15" fill="#1a1814" text-anchor="middle">
    <rect x="291" y="123" width="260" height="70" rx="16" fill="#fff" stroke="#1a1814" stroke-width="4"/>
    <text x="421" y="153" font-weight="700">¿Hay amenaza, presión</text><text x="421" y="176" font-weight="700">o petición de secreto?</text>
    <path d="M421 193v48" stroke="#1a1814" stroke-width="5"/><path d="m407 229 14 14 14-14" fill="none" stroke="#1a1814" stroke-width="5"/>
    <rect x="90" y="258" width="260" height="80" rx="16" fill="#fdf3e7" stroke="#c0392b" stroke-width="4"/>
    <text x="220" y="291" font-weight="700">Sí</text><text x="220" y="316">Guarda evidencia y pide apoyo</text>
    <rect x="492" y="258" width="260" height="80" rx="16" fill="#ffffff" stroke="#2c6e8a" stroke-width="4"/>
    <text x="622" y="291" font-weight="700">No estoy seguro</text><text x="622" y="316">Verifica antes de responder</text>
    <path d="M291 161H220v97M551 161h71v97" fill="none" stroke="#1a1814" stroke-width="5"/>
    <rect x="90" y="390" width="260" height="84" rx="16" fill="#fff" stroke="#e67e22" stroke-width="4"/>
    <text x="220" y="421" font-weight="700">Después</text><text x="220" y="446">Bloquea, reporta y avisa</text>
    <rect x="492" y="390" width="260" height="84" rx="16" fill="#fff" stroke="#3f7d58" stroke-width="4"/>
    <text x="622" y="421" font-weight="700">Si era falso</text><text x="622" y="446">No compartas ni difundas</text>
    <path d="M220 338v52M622 338v52" stroke="#1a1814" stroke-width="5"/><path d="m206 378 14 14 14-14M608 378l14 14 14-14" fill="none" stroke="#1a1814" stroke-width="5"/>
  </g>
  <rect x="54" y="512" width="734" height="42" rx="10" fill="#1a1814"/>
  <text x="421" y="539" font-family="Verdana" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Regla de oro: si te presionan para actuar rápido o guardar secreto, detente y pide ayuda.</text>
</svg>
